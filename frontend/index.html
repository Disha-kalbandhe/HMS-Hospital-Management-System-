<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MediCore - Intelligent Hospital System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </div>
            <div>
                <strong>MediCore</strong>
                <span>Intelligent HMS</span>
            </div>
        </div>

        <nav class="nav" aria-label="Primary">
            <span class="nav-section">Main Dashboard</span>
            <button class="nav-item active" data-page="dashboard" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="10" rx="1"/><rect width="7" height="5" x="3" y="14" rx="1"/></svg>
                <span>Dashboard</span>
            </button>
            <button class="nav-item" data-page="patients" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Patients</span>
            </button>
            <button class="nav-item" data-page="appointments" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
                <span>Appointments</span>
            </button>
            <button class="nav-item" data-page="doctors" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6h2a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>
                <span>Doctors</span>
            </button>

            <span class="nav-section">Hospital</span>
            <button class="nav-item" data-page="departments" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="12" x="2" y="8" rx="2"/><path d="M12 12h.01"/><path d="M12 16h.01"/><path d="M8 12h.01"/><path d="M8 16h.01"/><path d="M16 12h.01"/><path d="M16 16h.01"/></svg>
                <span>Departments</span>
            </button>
            <button class="nav-item" data-page="pharmacy" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                <span>Pharmacy</span>
            </button>

            <span class="nav-section">Analytics</span>
            <button class="nav-item" data-page="reports" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                <span>Reports</span>
            </button>
        </nav>

        <div class="profile">
            <span class="avatar">MS</span>
            <div>
                <strong>Dr. Marcus Sterling</strong>
                <span>HMS Administrator</span>
            </div>
        </div>
    </aside>

    <main class="shell">
        <div class="mobile-bar">
            <strong>MediCore HMS</strong>
            <select id="mobileNav" aria-label="Page navigation">
                <option value="dashboard">Dashboard</option>
                <option value="patients">Patients</option>
                <option value="appointments">Appointments</option>
                <option value="doctors">Doctors</option>
                <option value="departments">Departments</option>
                <option value="pharmacy">Pharmacy</option>
                <option value="reports">Reports</option>
            </select>
        </div>
        <section id="app" class="page" aria-live="polite"></section>
    </main>

    <dialog id="recordDialog" class="dialog">
        <form id="recordForm" method="dialog">
            <div class="dialog-head">
                <h2 id="dialogTitle"></h2>
                <button class="icon-button" id="closeDialog" type="button" aria-label="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                </button>
            </div>
            <div id="formFields" class="form-grid"></div>
            <div class="dialog-actions">
                <button class="secondary" id="cancelDialog" type="button">Cancel</button>
                <button class="primary" type="submit">Save Record</button>
            </div>
        </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
</body>
</html>
